events {}

http {
  server {
    listen 80;

    # Route /api/* to Express
    location /api/ {
      proxy_pass http://api:3001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Route everything else to React
    location / {
      proxy_pass http://web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}